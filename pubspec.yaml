name: ecommercestore
description: E-Commerce Store App built with Flutter & Clean Architecture
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Icons
  cupertino_icons: ^1.0.8

  # Localization (Arabic support)
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2

  # State Management
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5

  # Networking
  dio: ^5.4.0
  pretty_dio_logger: ^1.3.1
  cached_network_image: ^3.3.1
  connectivity_plus: ^6.0.3

  # Local Storage
  shared_preferences: ^2.2.2

  # Dependency Injection
  get_it: ^8.0.3

  # UI Helpers
  shimmer: ^3.0.0
  flutter_screenutil: ^5.9.0
  google_fonts: ^6.2.1
  flutter_staggered_animations: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.1

  # Bloc Testing
  bloc_test: ^9.1.7
  mocktail: ^1.0.3

  # App Icons Generator
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/

# Launcher Icon Configuration
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/logo.png"